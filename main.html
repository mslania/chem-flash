<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Mixed Reception</title>

<script>
    window.RufflePlayer = window.RufflePlayer || {};
</script>

<script defer src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>

<body bgcolor="#ffffff">

<center>

<div id="flash-container"></div>

<script>
window.addEventListener("load", () => {

    const ruffle = window.RufflePlayer.newest();

    const player = ruffle.createPlayer();

    document.getElementById("flash-container").appendChild(player);

    player.style.width = "700px";
    player.style.height = "575px";

    player.load("./main.swf");

});
</script>

</center>

</body>
</html>
